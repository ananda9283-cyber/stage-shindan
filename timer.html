<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ワークタイマー｜5Daysチャレンジ</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --gold:#D4AA6A;
  --gold2:#EDD9A3;
  --purple:#4A3060;
  --purple2:#6B4E8A;
  --white:#FFFFFF;
  --serif:'Cormorant Garamond',serif;
  --jp-serif:'Noto Serif JP',serif;
  --jp-sans:'Noto Sans JP',sans-serif;
}

html,body{
  width:100%;height:100%;
  background:#1A0E2E;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:var(--jp-sans);
  overflow:hidden;
  user-select:none;
}

.slide{
  width:min(100vw, 177.78vh);
  height:min(56.25vw, 100vh);
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* Background */
.bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 60% at 25% 30%, #3D2560 0%, transparent 60%),
    radial-gradient(ellipse 60% 70% at 80% 70%, #2A1840 0%, transparent 55%),
    linear-gradient(150deg, #1A0E2E 0%, #2E1A4A 50%, #1A0E2E 100%);
}

.grid{
  position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 49px,rgba(212,170,106,.04) 49px,rgba(212,170,106,.04) 50px),
    repeating-linear-gradient(90deg,transparent,transparent 49px,rgba(212,170,106,.04) 49px,rgba(212,170,106,.04) 50px);
}

.glow{
  position:absolute;
  width:70%;height:70%;
  border-radius:50%;
  background:radial-gradient(circle,rgba(106,78,138,.2) 0%,transparent 70%);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
}

/* Content */
.content{
  position:relative;z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:clamp(12px,2.5vh,28px);
  padding:4%;
}

.label{
  font-family:var(--serif);
  font-size:clamp(11px,1.5vw,18px);
  letter-spacing:.4em;
  color:rgba(212,170,106,.7);
  border-top:1px solid rgba(212,170,106,.3);
  border-bottom:1px solid rgba(212,170,106,.3);
  padding:.5em 2em;
}

.work-title{
  font-family:var(--jp-serif);
  font-weight:300;
  font-size:clamp(16px,3vw,38px);
  color:var(--white);
  letter-spacing:.1em;
  line-height:1.6;
}

.divider{
  display:flex;align-items:center;gap:1.5vw;
  width:50%;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(to right,transparent,rgba(212,170,106,.4));
}
.divider::after{background:linear-gradient(to left,transparent,rgba(212,170,106,.4))}
.divider-icon{
  font-family:var(--serif);
  font-size:clamp(14px,2vw,22px);
  color:rgba(212,170,106,.6);
}

/* Timer display */
.timer-wrap{
  position:relative;
  cursor:pointer;
}

.timer-ring{
  position:relative;
  width:clamp(160px,22vw,280px);
  height:clamp(160px,22vw,280px);
}

.timer-ring svg{
  position:absolute;inset:0;
  width:100%;height:100%;
  transform:rotate(-90deg);
}

.ring-bg{
  fill:none;
  stroke:rgba(255,255,255,.06);
  stroke-width:3;
}
.ring-fill{
  fill:none;
  stroke:url(#goldGrad);
  stroke-width:3;
  stroke-linecap:round;
  stroke-dasharray:283;
  stroke-dashoffset:0;
  transition:stroke-dashoffset 1s linear;
}

.timer-inner{
  position:absolute;inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:.3em;
}

.timer-display{
  font-family:var(--serif);
  font-size:clamp(40px,8vw,96px);
  font-weight:300;
  letter-spacing:.05em;
  line-height:1;
  background:linear-gradient(120deg,var(--gold2),var(--gold),var(--gold2));
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:shimmer 3s linear infinite;
}

@keyframes shimmer{
  0%{background-position:200% center}
  100%{background-position:-200% center}
}

.timer-status{
  font-size:clamp(9px,1vw,13px);
  letter-spacing:.25em;
  color:rgba(255,255,255,.35);
  text-transform:uppercase;
}

/* Hint text */
.hint{
  font-size:clamp(10px,1.2vw,14px);
  letter-spacing:.15em;
  color:rgba(255,255,255,.3);
}

/* Preset buttons */
.presets{
  display:flex;gap:clamp(8px,1.5vw,20px);
  flex-wrap:wrap;
  justify-content:center;
}

.preset-btn{
  padding:.5em 1.5em;
  background:transparent;
  border:1px solid rgba(212,170,106,.3);
  color:rgba(212,170,106,.6);
  font-family:var(--jp-sans);
  font-size:clamp(10px,1.2vw,14px);
  letter-spacing:.12em;
  cursor:pointer;
  transition:all .3s;
  border-radius:2px;
}
.preset-btn:hover{
  border-color:var(--gold);
  color:var(--gold);
  background:rgba(212,170,106,.08);
}
.preset-btn.active{
  border-color:var(--gold);
  color:var(--gold2);
  background:rgba(212,170,106,.12);
}

/* Action buttons */
.actions{
  display:flex;gap:clamp(8px,1.5vw,20px);
}

.btn-main{
  padding:.6em 2.5em;
  background:transparent;
  border:1px solid var(--gold);
  color:var(--gold2);
  font-family:var(--jp-sans);
  font-size:clamp(11px,1.3vw,16px);
  letter-spacing:.2em;
  cursor:pointer;
  transition:all .3s;
  position:relative;overflow:hidden;
}
.btn-main::before{
  content:'';position:absolute;inset:0;
  background:var(--gold);
  transform:translateX(-100%);
  transition:transform .3s;z-index:0;
}
.btn-main:hover::before{transform:translateX(0)}
.btn-main:hover{color:#1A0E2E}
.btn-main span{position:relative;z-index:1}

.btn-reset{
  padding:.6em 1.5em;
  background:transparent;
  border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.3);
  font-family:var(--jp-sans);
  font-size:clamp(11px,1.3vw,16px);
  letter-spacing:.15em;
  cursor:pointer;
  transition:all .3s;
}
.btn-reset:hover{
  border-color:rgba(255,255,255,.3);
  color:rgba(255,255,255,.5);
}

/* Work title selector */
.title-select{
  background:transparent;
  border:none;
  border-bottom:1px solid rgba(212,170,106,.3);
  color:var(--white);
  font-family:var(--jp-serif);
  font-size:clamp(16px,3vw,38px);
  font-weight:300;
  letter-spacing:.1em;
  text-align:center;
  cursor:pointer;
  appearance:none;
  padding:.1em .5em;
  outline:none;
}
.title-select option{
  background:#2E1A4A;
  color:var(--white);
  font-size:16px;
}

/* Alarm overlay */
.alarm-overlay{
  position:fixed;inset:0;
  background:rgba(212,170,106,.15);
  pointer-events:none;
  opacity:0;
  transition:opacity .5s;
  z-index:10;
}
.alarm-overlay.show{
  animation:alarmPulse 1s ease-in-out infinite;
}
@keyframes alarmPulse{
  0%,100%{opacity:0}
  50%{opacity:1}
}

/* Finish message */
.finish-msg{
  display:none;
  position:absolute;
  font-family:var(--jp-serif);
  font-size:clamp(14px,2vw,24px);
  color:var(--gold2);
  letter-spacing:.1em;
  text-align:center;
  line-height:2;
  animation:fadeIn .5s ease;
}
.finish-msg.show{display:block}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── BGM styles ── */
.bgm-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:clamp(6px,1.2vh,14px);
  padding:clamp(10px,2vh,20px) clamp(16px,3vw,40px);
  border:1px solid rgba(212,170,106,.15);
  background:rgba(255,255,255,.03);
  border-radius:4px;
  width:min(480px,90vw);
}

.bgm-label{
  display:flex;align-items:center;gap:.6em;
  font-family:var(--serif);
  font-size:clamp(10px,1.1vw,13px);
  letter-spacing:.35em;
  color:rgba(212,170,106,.6);
}
.bgm-icon{
  font-size:1.2em;
  animation:float 3s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}


.bgm-vol{
  display:flex;align-items:center;gap:clamp(6px,1vw,12px);
  width:100%;
}
.vol-icon{font-size:clamp(10px,1.2vw,14px);opacity:.5}

.vol-slider{
  flex:1;
  -webkit-appearance:none;
  height:2px;
  background:linear-gradient(to right,var(--gold) var(--val,30%),rgba(255,255,255,.1) var(--val,30%));
  border-radius:2px;
  outline:none;
  cursor:pointer;
}
.vol-slider::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:14px;height:14px;
  border-radius:50%;
  background:var(--gold);
  cursor:pointer;
  transition:transform .2s;
}
.vol-slider::-webkit-slider-thumb:hover{transform:scale(1.3)}

.bgm-toggle-wrap{
  display:flex;gap:clamp(6px,1vw,12px);
}

.bgm-toggle{
  padding:.45em 1.5em;
  background:transparent;
  border:1px solid rgba(212,170,106,.35);
  color:rgba(212,170,106,.6);
  font-family:var(--jp-sans);
  font-size:clamp(10px,1.1vw,13px);
  letter-spacing:.12em;
  cursor:pointer;
  border-radius:2px;
  transition:all .3s;
}
.bgm-toggle:hover{border-color:var(--gold);color:var(--gold2)}
.bgm-toggle.on{
  border-color:var(--gold);
  color:var(--gold2);
  background:rgba(212,170,106,.12);
}

.bgm-now{
  padding:.45em 1.2em;
  background:transparent;
  border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.3);
  font-family:var(--jp-sans);
  font-size:clamp(10px,1.1vw,13px);
  letter-spacing:.12em;
  cursor:pointer;
  border-radius:2px;
  transition:all .3s;
}
.bgm-now:hover{border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.5)}
.bgm-now.playing{
  border-color:rgba(212,170,106,.5);
  color:var(--gold);
}

/* ファイル読み込み */
.file-load-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  width:100%;
}
.file-load-label{
  display:inline-block;
  padding:.45em 1.5em;
  border:1px dashed rgba(212,170,106,.4);
  color:rgba(212,170,106,.6);
  font-size:clamp(10px,1.1vw,13px);
  letter-spacing:.1em;
  cursor:pointer;
  border-radius:2px;
  transition:all .3s;
  text-align:center;
}
.file-load-label:hover{
  border-color:var(--gold);
  color:var(--gold2);
  background:rgba(212,170,106,.08);
}
.file-name{
  font-size:clamp(9px,1vw,12px);
  color:rgba(255,255,255,.3);
  letter-spacing:.08em;
}
.file-name.loaded{
  color:var(--gold2);
}


/* Corner branding */
.corner{
  position:absolute;
  bottom:2%;right:2%;
  font-family:var(--serif);
  font-size:clamp(9px,.9vw,12px);
  letter-spacing:.2em;
  color:rgba(255,255,255,.15);
  z-index:2;
}
</style>
</head>
<body>

<div class="alarm-overlay" id="alarmOverlay"></div>

<div class="slide">
  <div class="bg"></div>
  <div class="grid"></div>
  <div class="glow"></div>

  <div class="content">

    <span class="label">Work Time</span>

    <select class="title-select" id="workTitle" onchange="updateTitle()">
      <option value="現在地ワークをやってみよう">現在地ワークをやってみよう</option>
      <option value="ブレイクアウトルーム　自己紹介">ブレイクアウトルーム　自己紹介</option>
      <option value="価値観キーワード洗い出しワーク">価値観キーワード洗い出しワーク</option>
      <option value="使命文をつくってみよう">使命文をつくってみよう</option>
      <option value="ブレイクアウトルーム　使命文シェア">ブレイクアウトルーム　使命文シェア</option>
      <option value="競合調査ワーク">競合調査ワーク</option>
      <option value="ペルソナ作成ワーク">ペルソナ作成ワーク</option>
      <option value="3C分析ワーク">3C分析ワーク</option>
      <option value="講座設計ワーク">講座設計ワーク</option>
      <option value="価格設定ワーク">価格設定ワーク</option>
      <option value="LP原稿作成ワーク">LP原稿作成ワーク</option>
    </select>

    <div class="divider"><span class="divider-icon">✦</span></div>

    <div class="timer-wrap" onclick="toggleTimer()">
      <div class="timer-ring">
        <svg viewBox="0 0 100 100">
          <defs>
            <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#EDD9A3"/>
              <stop offset="50%" style="stop-color:#D4AA6A"/>
              <stop offset="100%" style="stop-color:#EDD9A3"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="50" cy="50" r="45"/>
          <circle class="ring-fill" id="ringFill" cx="50" cy="50" r="45"/>
        </svg>
        <div class="timer-inner">
          <div class="timer-display" id="timerDisplay">15:00</div>
          <div class="timer-status" id="timerStatus">tap to start</div>
        </div>
      </div>
    </div>

    <div class="finish-msg" id="finishMsg">
      お疲れさまでした！<br>シェアの時間にしましょう ✦
    </div>

    <!-- Preset times -->
    <div class="presets">
      <button class="preset-btn" onclick="setTime(3)">3分</button>
      <button class="preset-btn" onclick="setTime(5)">5分</button>
      <button class="preset-btn" onclick="setTime(8)">8分</button>
      <button class="preset-btn active" onclick="setTime(15)">15分</button>
      <button class="preset-btn" onclick="setTime(20)">20分</button>
      <button class="preset-btn" onclick="setTime(40)">40分</button>
    </div>

    <div class="actions">
      <button class="btn-main" id="mainBtn" onclick="toggleTimer()"><span id="mainBtnText">スタート</span></button>
      <button class="btn-reset" onclick="resetTimer()">リセット</button>
    </div>

    <span class="hint">タイマーをクリックしてもスタート／ストップできます</span>

    <!-- ── BGM : Break Free ── -->
    <div class="bgm-wrap">
      <div class="bgm-label">
        <span class="bgm-icon" id="bgmIcon">♪</span>
        <span>BGM &nbsp;—&nbsp; Break Free</span>
      </div>

      <label class="file-load-label" for="musicFile">
        🎵 &nbsp;Break Free を読み込む
      </label>
      <input type="file" id="musicFile" accept="audio/*" onchange="loadMusicFile(this)" style="display:none">
      <span class="file-name" id="fileName">ファイル未選択</span>

      <div class="bgm-vol">
        <span class="vol-icon">🔈</span>
        <input type="range" id="volSlider" min="0" max="100" value="50"
               oninput="setVolume(this.value)" class="vol-slider">
        <span class="vol-icon">🔊</span>
      </div>

      <div class="bgm-toggle-wrap">
        <button class="bgm-toggle on" id="bgmToggle" onclick="toggleBgmLink()">
          <span id="bgmToggleText">タイマーと連動 ON</span>
        </button>
        <button class="bgm-now" id="bgmNow" onclick="previewBgm()">
          <span id="bgmNowText">試聴</span>
        </button>
      </div>
    </div>

  </div>

  <div class="corner">5Daysチャレンジ｜高単価講座設計</div>
</div>

<script>
let totalSeconds = 15 * 60;
let remainingSeconds = totalSeconds;
let isRunning = false;
let interval = null;
const circumference = 2 * Math.PI * 45; // 283

const display = document.getElementById('timerDisplay');
const status = document.getElementById('timerStatus');
const ringFill = document.getElementById('ringFill');
const mainBtnText = document.getElementById('mainBtnText');
const finishMsg = document.getElementById('finishMsg');
const alarmOverlay = document.getElementById('alarmOverlay');

ringFill.style.strokeDasharray = circumference;
ringFill.style.strokeDashoffset = 0;

function setTime(minutes){
  if(isRunning) return;
  totalSeconds = minutes * 60;
  remainingSeconds = totalSeconds;
  updateDisplay();
  updateRing();
  finishMsg.classList.remove('show');
  alarmOverlay.classList.remove('show');
  status.textContent = 'tap to start';
  mainBtnText.textContent = 'スタート';
  // Update active button
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function updateDisplay(){
  const m = Math.floor(remainingSeconds / 60);
  const s = remainingSeconds % 60;
  display.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  // Color shift in last minute
  if(remainingSeconds <= 60 && remainingSeconds > 0){
    display.style.background = 'linear-gradient(120deg,#FF9A9A,#FFB347,#FF9A9A)';
    display.style.backgroundSize = '200% auto';
    display.style.webkitBackgroundClip = 'text';
    display.style.webkitTextFillColor = 'transparent';
  } else {
    display.style.background = 'linear-gradient(120deg,#EDD9A3,#D4AA6A,#EDD9A3)';
    display.style.backgroundSize = '200% auto';
    display.style.webkitBackgroundClip = 'text';
    display.style.webkitTextFillColor = 'transparent';
  }
}

function updateRing(){
  const progress = remainingSeconds / totalSeconds;
  const offset = circumference * (1 - progress);
  ringFill.style.strokeDashoffset = offset;
}

function toggleTimer(){
  if(remainingSeconds === 0) return;
  if(isRunning){
    clearInterval(interval);
    isRunning = false;
    status.textContent = 'paused';
    mainBtnText.textContent = 'スタート';
  } else {
    isRunning = true;
    status.textContent = 'running...';
    mainBtnText.textContent = 'ストップ';
    interval = setInterval(()=>{
      remainingSeconds--;
      updateDisplay();
      updateRing();
      if(remainingSeconds <= 0){
        clearInterval(interval);
        isRunning = false;
        finishMsg.classList.add('show');
        alarmOverlay.classList.add('show');
        status.textContent = 'finished!';
        mainBtnText.textContent = 'スタート';
        display.textContent = '00:00';
        // Play beep
        playBeep();
        // Stop alarm after 5 seconds
        setTimeout(()=>{alarmOverlay.classList.remove('show')}, 5000);
      }
    }, 1000);
  }
}

function resetTimer(){
  clearInterval(interval);
  isRunning = false;
  remainingSeconds = totalSeconds;
  updateDisplay();
  updateRing();
  finishMsg.classList.remove('show');
  alarmOverlay.classList.remove('show');
  status.textContent = 'tap to start';
  mainBtnText.textContent = 'スタート';
}

function updateTitle(){
  // Just updates the displayed work title via select
}

function playBeep(){
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const playTone = (freq, start, duration) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + duration);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + duration);
    };
    playTone(880, 0, 0.3);
    playTone(880, 0.4, 0.3);
    playTone(1100, 0.8, 0.6);
  } catch(e){}
}

// ══════════ BGM : Break Free ══════════
let musicAudio = null;
let musicLoaded = false;
let bgmLinked = true;
let bgmVolume = 0.50;
let bgmPreviewing = false;
let bgmPlaying = false;

function loadMusicFile(input){
  const file = input.files[0];
  if(!file) return;
  if(musicAudio){ musicAudio.pause(); musicAudio.src=''; }
  musicAudio = new Audio(URL.createObjectURL(file));
  musicAudio.loop = true;
  musicAudio.volume = bgmVolume;
  musicLoaded = true;
  const nameEl = document.getElementById('fileName');
  nameEl.textContent = '♪ ' + file.name;
  nameEl.classList.add('loaded');
  document.getElementById('bgmIcon').style.color = 'var(--gold2)';
}

function startBgm(){
  if(!musicLoaded) return;
  musicAudio.volume = bgmVolume;
  musicAudio.play().catch(()=>{});
  bgmPlaying = true;
  document.getElementById('bgmIcon').style.color = 'var(--gold2)';
}

function stopBgm(){
  if(!musicAudio) return;
  musicAudio.pause();
  musicAudio.currentTime = 0;
  bgmPlaying = false;
  bgmPreviewing = false;
  document.getElementById('bgmIcon').style.color = 'rgba(212,170,106,.6)';
  document.getElementById('bgmNowText').textContent = '試聴';
  document.getElementById('bgmNow').classList.remove('playing');
}

function setVolume(val){
  bgmVolume = val / 100;
  if(musicAudio) musicAudio.volume = bgmVolume;
  const slider = document.getElementById('volSlider');
  slider.style.background = `linear-gradient(to right, var(--gold) ${val}%, rgba(255,255,255,.1) ${val}%)`;
}

function toggleBgmLink(){
  bgmLinked = !bgmLinked;
  const btn = document.getElementById('bgmToggle');
  const txt = document.getElementById('bgmToggleText');
  btn.classList.toggle('on', bgmLinked);
  txt.textContent = bgmLinked ? 'タイマーと連動 ON' : '連動 OFF（手動）';
}

function previewBgm(){
  if(bgmPlaying){
    stopBgm();
  } else {
    if(!musicLoaded){
      alert('先に「Break Free を読み込む」からファイルを選択してください');
      return;
    }
    startBgm();
    bgmPreviewing = true;
    document.getElementById('bgmNowText').textContent = '停止';
    document.getElementById('bgmNow').classList.add('playing');
  }
}

// タイマーとBGMの連動
const _origToggle = toggleTimer;
toggleTimer = function(){
  _origToggle();
  if(!bgmLinked || !musicLoaded) return;
  if(isRunning && !bgmPlaying){ bgmPreviewing=false; startBgm(); }
  else if(!isRunning && bgmPlaying){ stopBgm(); }
};

const _origReset = resetTimer;
resetTimer = function(){
  _origReset();
  if(bgmPlaying) stopBgm();
};

// 初期スライダー描画
setVolume(50);

// キーボードショートカット
document.addEventListener('keydown', e => {
  if(e.code==='Space'){ e.preventDefault(); toggleTimer(); }
  if(e.code==='KeyR'){ resetTimer(); }
  if(e.code==='KeyM'){ previewBgm(); }
});

updateDisplay();
</script>
</body>
</html>
